# compose.yaml
services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://dev:dev@db:5432/app
      PORT: 3000
    depends_on:
      - db
    volumes:
      - ./:/app              # bind mount → live source, edits hot-reload
      - /app/node_modules    # anonymous volume → protects container's deps (see below)
    command: npm run dev

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data   # named volume → durable DB data
    ports:
      - "5432:5432"

volumes:
  pgdata: