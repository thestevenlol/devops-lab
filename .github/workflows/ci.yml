name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 1. unit/integration tests — fast, against source, gate everything else
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

      # 2. build the prod image, load it locally (don't push yet)
      - uses: docker/setup-buildx-action@v4
      - name: Build image for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          target: prod
          load: true
          tags: app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. smoke test the ACTUAL container that will ship
      - name: Smoke test
        run: |
          docker run -d --name app -p 3000:3000 app:ci
          for i in {1..10}; do
            curl -fsS http://localhost:3000/health && break
            sleep 1
          done
          echo
          curl -fsS http://localhost:3000/health | grep -q '"status":"ok"'
          curl -fsS http://localhost:3000/ | grep -q 'Hello'
          docker rm -f app

      # 4. only now — and only on merge to main — publish the tested image
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
      - name: Push tested image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max